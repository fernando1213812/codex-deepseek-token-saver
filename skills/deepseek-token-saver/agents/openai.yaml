display_name: DeepSeek Token Saver
short_description: Default-on token-saving workflow for low-risk project work, with DeepSeek drafting and Codex reviewing.
default_prompt: For most project-shaped tasks, activate deepseek-token-saver by default when DeepSeek can draft a reviewable candidate and Codex can audit it. Use persistent workers for one bounded stream, Agent Room for explicit multi-agent writer/reviewer loops, quality gates for implementation work, transcript export when the user asks to see the conversation, and keep Codex/GPT responsible for final verification and high-risk decisions.
