display_name: DeepSeek Persistent Worker
short_description: Bridge Codex to a persistent DeepSeek worker with memory, quality gates, reflection, and token-savings logs.
default_prompt: Use deepseek_agent.py for DeepSeek work that should behave like an embedded worker. Reuse a stable agent_id, pass workflow_id and task_id, require quality gates, write ordinary calls to transcript, promote only Codex-reviewed lessons to durable memory, and keep GPT-5.5/Codex responsible for final review.
