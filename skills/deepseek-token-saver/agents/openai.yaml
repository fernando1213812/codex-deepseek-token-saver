display_name: DeepSeek Token Saver
short_description: Default-on token-saving workflow for low-risk project work, with DeepSeek or Reasonix doing the bulk execution and Codex reviewing.
default_prompt: For most project-shaped tasks, activate deepseek-token-saver by default when DeepSeek or Reasonix can draft a reviewable candidate and Codex can audit it. Use persistent workers for one bounded stream, Agent Room for explicit writer/reviewer loops, and deepseek_reasonix.py when the user wants an always-on room, aggressive token savings, or multi-agent cheap execution with self-review before Codex final review. Keep Codex/GPT responsible for final verification and high-risk decisions.
